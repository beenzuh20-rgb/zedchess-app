{% extends "base.html" %}
{% block title %}Admin · Config{% endblock %}
{% block content %}
<section class="content" style="max-width:680px;">
  <div class="card">
    <div class="section-title"><i class="fa-solid fa-gear"></i> Platform Configuration</div>
    <form method="POST" action="{{ url_for('admin.config') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="grid grid-2">
        <div class="field"><label>Commission Rate (%)</label>
          <input type="number" step="0.01" name="commission_rate" value="{{ settings.commission_rate * 100 }}"></div>
        <div class="field"><label>Disconnect Forfeit (s)</label>
          <input type="number" name="disconnect_seconds" value="{{ settings.disconnect_forfeit_seconds }}"></div>
      </div>
      <div class="field"><label>Default Time Control</label>
        <input name="default_time_control" value="{{ settings.default_time_control }}"></div>
      <div class="field"><label>Announcement</label>
        <textarea name="announcement" rows="3">{{ settings.announcement or '' }}</textarea></div>
      <label style="display:flex;gap:8px;"><input type="checkbox" name="maintenance" {% if settings.maintenance_mode %}checked{% endif %} style="width:auto;"> Maintenance mode</label>
      <button class="btn btn-primary" type="submit" style="width:100%;margin-top:10px;">Save Settings</button>
    </form>
  </div>
</section>
{% endblock %}
