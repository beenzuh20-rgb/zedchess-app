{% extends "base.html" %}
{% block title %}Login · ZedChess{% endblock %}
{% block content %}
<section class="content" style="max-width:420px;">
  <div class="card fade-in">
    <div style="text-align:center; margin-bottom:18px;">
      <img class="site-logo auth-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="ZedChess">
    </div>
    <h2><i class="fa-solid fa-right-to-bracket"></i> Login</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;">Login</button>
    </form>
    <p class="text-dim" style="margin-top:14px;">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
    <p class="text-dim"><a href="{{ url_for('auth.reset_request') }}">Forgot password?</a></p>
  </div>
</section>
{% endblock %}
